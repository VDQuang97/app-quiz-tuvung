<title>App cua QUANG</title>

<style>
body {
  font-family: Arial;
  padding: 16px;
  max-width: 500px;
  margin: auto;
  background: #f9f9f9;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.back-btn {
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  background: #ccc;
}

.progress-container {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
}

.progress-bar {
  flex: 1;
  height: 10px;
  background: #eee;
  border-radius: 5px;
}

.progress {
  height: 100%;
  background: #4caf50;
  width: 0%;
}

.card {
  background: #fff;
  border-radius: 15px;
  padding: 20px;
  margin-top: 20px;
}

#question {
  font-size: 22px;
  font-weight: bold;
  text-align: center;
}

.answers {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 20px;
}

.btn {
  padding: 18px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 18px;
  background: #fff;
}

.correct { background: #c8f7c5; }
.wrong { background: #f7c5c5; }

.setting-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 15px;
}

.review-btn {
  margin-top: 15px;
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #4caf50, #66bb6a);
  color: white;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

.review-btn:active {
  transform: scale(0.98);
}

/* SWITCH */
.switch {
  position: relative;
  width: 50px;
  height: 26px;
}

.switch input {
  display: none;
}

.slider {
  position: absolute;
  background: #ccc;
  border-radius: 26px;
  top: 0; left: 0; right: 0; bottom: 0;
  transition: .3s;
}

.slider:before {
  content: "";
  position: absolute;
  height: 20px;
  width: 20px;
  left: 3px;
  bottom: 3px;
  background: white;
  border-radius: 50%;
  transition: .3s;
}

.info-row {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  margin-top: 20px;
}

.stats {
  flex: 1;
  font-size: 14px;
}

.settings {
  width: 120px;
  text-align: right;
}

.settings h4 {
  margin: 0 0 10px 0;
}

input:checked + .slider {
  background: #4caf50;
}

input:checked + .slider:before {
  transform: translateX(24px);
}
</style>
</head>

<div class="top-bar">

<div class="progress-container">

<div class="card">

// ===== STATE =====
let lessonData = [];
let currentIndex = 0;
let currentQuestion;

let correctCount = 0;
let wrongCount = 0;
let score = 0;
let wrongList = [];

let quizMode = "vn_to_jp";
let showReading = true;

let currentOptions = []; // 🔥 lưu 4 đáp án hiện tại

// ===== LOAD =====
try {
  const s = JSON.parse(localStorage.getItem(SETTING_KEY));
  if (s) {
    quizMode = s.quizMode || quizMode;
    showReading = s.showReading ?? showReading;
  }

  const w = JSON.parse(localStorage.getItem(STORAGE_KEY));
  if (w) wrongList = w;
} catch (e) {}

// ===== INIT UI =====
document.addEventListener("DOMContentLoaded", () => {
  const mode = document.getElementById("modeToggle");
  const reading = document.getElementById("readingToggle");

  if (mode) mode.checked = (quizMode === "jp_to_vn");
  if (reading) reading.checked = showReading;

  

  start();
});

// ===== SAVE =====
function saveSetting() {
  localStorage.setItem(SETTING_KEY, JSON.stringify({ quizMode, showReading }));
}

function saveWrong() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(wrongList));
}

// ===== FLOW =====
function start() {
  lessonData = [...data].sort(() => Math.random() - 0.5);
  currentIndex = 0;
  next();
}

function next() {
  if (currentIndex >= lessonData.length) {
    alert("🎉 Hoàn thành!");
    return;
  }

  currentQuestion = lessonData[currentIndex++];
  currentOptions = []; // reset options mới cho từ mới
  render();
  update();
}

// ===== RENDER =====
function render() {
  const q = document.getElementById("question");

  // render câu hỏi
  if (quizMode === "vn_to_jp") {
    q.innerText = currentQuestion.meaning;
  } else {
    q.innerText = currentQuestion.word +
      (showReading && currentQuestion.reading ? " (" + currentQuestion.reading + ")" : "");
  }

  // tạo options nếu chưa có
  if (!currentOptions.length) {
    let options = [currentQuestion];
    while (options.length < 4) {
      let r = data[Math.floor(Math.random() * data.length)];
      if (!options.includes(r)) options.push(r);
    }
    options.sort(() => Math.random() - 0.5);
    currentOptions = options;
  }

  // render đáp án
  const ans = document.getElementById("answers");
  ans.innerHTML = "";
  currentOptions.forEach(opt => {
    let btn = document.createElement("div");
    btn.className = "btn";

    btn.innerText =
      quizMode === "vn_to_jp"
        ? opt.word + (showReading && opt.reading ? " (" + opt.reading + ")" : "")
        : opt.meaning;

    btn.onclick = () => check(btn, opt);
    ans.appendChild(btn);
  });
}

// ===== CHECK =====
function check(btn, selected) {
  const buttons = document.querySelectorAll(".btn");
  buttons.forEach(b => b.onclick = null);

  if (selected.word === currentQuestion.word) {
    btn.classList.add("correct");
    correctCount++;
    score++;
    wrongList = wrongList.filter(w => w.word !== currentQuestion.word);
  } else {
    btn.classList.add("wrong");
    wrongCount++;

    if (!wrongList.some(w => w.word === currentQuestion.word)) {
      wrongList.push(currentQuestion);
    }

    buttons.forEach(b => {
      if (b.innerText.includes(currentQuestion.word)) {
        b.classList.add("correct");
      }
    });
  }

  saveWrong();
  update();
  setTimeout(next, 700);
}

// ===== SETTINGS =====
function toggleMode() {
  const el = document.getElementById("modeToggle");
  if (!el) return;

  quizMode = el.checked ? "jp_to_vn" : "vn_to_jp";
  saveSetting();
  render(); // chỉ cập nhật text, không random options
}

function toggleReading() {
  const el = document.getElementById("readingToggle");
  if (!el) return;

  showReading = el.checked;
  saveSetting();
  render(); // chỉ cập nhật text, không random options
}

// ===== REVIEW =====
function reviewWrong() {
  if (wrongList.length === 0) {
    alert("Không có từ sai");
    return;
  }

  lessonData = [...wrongList];
  currentIndex = 0;
  next();
}

// ===== UI =====
function update() {
  document.getElementById("progressText").innerText =
    currentIndex + "/" + lessonData.length;

  document.getElementById("progressBar").style.width =
    (currentIndex / lessonData.length) * 100 + "%";

  document.getElementById("correct").innerText = correctCount;
  document.getElementById("wrong").innerText = wrongCount;
  document.getElementById("score").innerText = score;
  document.getElementById("wrongTotal").innerText = wrongList.length;
}

// ===== NAV =====
function goBack() {
  window.location.href = "index.html";
}
