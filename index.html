<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JLPT Quiz</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: Arial;
  padding: 16px;
  max-width: 500px;
  margin: auto;
  background: #f9f9f9;
}

.progress-container {
  display: flex;
  align-items: center;
  gap: 10px;
}
.progress-bar {
  flex: 1;
  height: 10px;
  background: #eee;
  border-radius: 5px;
  overflow: hidden;
}
.progress {
  height: 100%;
  background: #4caf50;
  width: 0%;
  transition: 0.3s;
}

.card {
  background: #fff;
  border-radius: 15px;
  padding: 20px;
  margin-top: 20px;
}

#question {
  font-size: 22px;
  font-weight: bold;
  text-align: center;
}

.answers {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 20px;
}

.btn {
  padding: 18px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 18px;
  background: #fff;
  text-align: center;
}

.correct { background: #c8f7c5; }
.wrong { background: #f7c5c5; }

.stats {
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="progress-container">
  <div class="progress-bar">
    <div class="progress" id="progressBar"></div>
  </div>
  <span id="progressText">0 / 0</span>
</div>

<div class="card">
  <div id="question"></div>
  <div class="answers" id="answers"></div>

  <div class="stats">
    <p>✅ Đúng: <span id="correct">0</span></p>
    <p>❌ Sai: <span id="wrong">0</span></p>
    <p>🏆 Điểm: <span id="score">0</span></p>
  </div>
</div>

<script>
// ===== DATA =====
const data = [
  { word: "消費者", reading: "しょうひしゃ", meaning: "người tiêu dùng" },
  { word: "消費税", reading: "しょうひぜい", meaning: "thuế tiêu dùng" },
  { word: "代謝", reading: "たいしゃ", meaning: "trao đổi chất" },
  { word: "観賞する", reading: "かんしょうする", meaning: "thưởng thức" }
];

// ===== STATE =====
let lessonData = [];
let currentIndex = 0;
let currentQuestion;

let correctCount = 0;
let wrongCount = 0;
let score = 0;

// ===== UTILS =====
function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

// ===== START =====
function startLesson() {
  lessonData = [...data];
  shuffle(lessonData);

  currentIndex = 0;
  correctCount = 0;
  wrongCount = 0;
  score = 0;

  newQuestion();
}

function updateProgress() {
  document.getElementById("progressText").innerText =
    currentIndex + " / " + lessonData.length;

  document.getElementById("progressBar").style.width =
    (currentIndex / lessonData.length) * 100 + "%";

  document.getElementById("correct").innerText = correctCount;
  document.getElementById("wrong").innerText = wrongCount;
  document.getElementById("score").innerText = score;
}

function newQuestion() {
  if (currentIndex >= lessonData.length) {
    alert("🎉 Hoàn thành!");
    return;
  }

  currentQuestion = lessonData[currentIndex];
  currentIndex++;

  updateProgress();

  let options = [currentQuestion];

  while (options.length < 4) {
    let rand = data[Math.floor(Math.random() * data.length)];
    if (!options.includes(rand)) options.push(rand);
  }

  options = shuffle(options);

  document.getElementById("question").innerText =
    currentQuestion.meaning;

  const answerDiv = document.getElementById("answers");
  answerDiv.innerHTML = "";

  options.forEach(opt => {
    let btn = document.createElement("div");
    btn.className = "btn";

    btn.innerText = opt.word + (opt.reading ? " (" + opt.reading + ")" : "");

    btn.onclick = () => checkAnswer(btn, opt);

    answerDiv.appendChild(btn);
  });
}

function checkAnswer(btn, selected) {
  const buttons = document.querySelectorAll(".btn");
  buttons.forEach(b => b.onclick = null);

  if (selected.word === currentQuestion.word) {
    btn.classList.add("correct");
    correctCount++;
    score++;
  } else {
    btn.classList.add("wrong");
    wrongCount++;

    buttons.forEach(b => {
      if (b.innerText.includes(currentQuestion.word)) {
        b.classList.add("correct");
      }
    });
  }

  updateProgress();
  setTimeout(newQuestion, 800);
}

startLesson();

// ===== SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
